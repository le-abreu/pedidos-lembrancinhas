name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_net

  app:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      RUN_SEED: ${RUN_SEED}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - app_net

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app_net

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" && \
        mc mb --ignore-existing local/"${S3_BUCKET}"
    networks:
      - app_net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_net

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-postgres-data
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-pgadmin-data
  minio_data:
    name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-minio-data

networks:
  app_net:
    name: ${COMPOSE_PROJECT_NAME:-pedido-lembrancinha}-net
    driver: bridge
